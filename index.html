<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>南海トラフ 津波避難診断｜あなたの地点はどれくらい危険？</title>
<style>
  :root{
    --bg:#0a1420;
    --panel:#11202f;
    --panel2:#152838;
    --line:#23394d;
    --ink:#eaf2fa;
    --muted:#8aa3bb;
    --sea:#1f9be0;
    --sea-deep:#0d6fb0;
    --warn:#ffb02e;
    --danger:#ff4d4f;
    --crit:#ff2d2d;
    --safe:#1fc77d;
    --radius:16px;
    --font:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
    --num:"Bebas Neue","Arial Narrow",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 500px at 50% -5%, #14324d 0%, transparent 55%),
      var(--bg);
    background-color:var(--bg);
    color:var(--ink);font-family:var(--font);line-height:1.7;
    min-height:100vh;min-height:100dvh;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:680px;margin:0 auto;padding:22px 16px 70px;}

  /* ヘッダー */
  .hero{text-align:center;margin-bottom:26px;}
  .hero .wave{font-size:40px;line-height:1;margin-bottom:6px;}
  .hero h1{font-size:23px;margin:0 0 8px;letter-spacing:.01em;}
  .hero h1 b{color:var(--sea);}
  .hero p{font-size:13px;color:var(--muted);margin:0;}

  /* カード共通 */
  .card{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 18px;margin-bottom:16px;
  }
  .card h2{font-size:15px;margin:0 0 16px;display:flex;align-items:center;gap:9px;}
  .card h2 .step{
    flex:0 0 24px;width:24px;height:24px;border-radius:7px;background:var(--sea);
    color:#fff;font-size:13px;font-weight:700;display:grid;place-items:center;
  }

  label.fld{display:block;margin-bottom:14px;}
  label.fld:last-child{margin-bottom:0;}
  label.fld .lbl{font-size:13px;color:var(--muted);margin-bottom:6px;display:block;}
  select,input[type=text]{
    width:100%;padding:13px 12px;border-radius:11px;
    background:var(--bg);border:1px solid var(--line);color:var(--ink);
    font-family:inherit;font-size:16px;appearance:none;
  }
  select:focus,input:focus{outline:none;border-color:var(--sea);box-shadow:0 0 0 3px rgba(31,155,224,.18);}
  select:disabled{opacity:.45;}
  .select-wrap{position:relative;}
  .select-wrap::after{
    content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);
    color:var(--muted);pointer-events:none;font-size:12px;
  }

  .btn-go{
    width:100%;margin-top:4px;padding:16px;border:none;border-radius:13px;cursor:pointer;
    background:linear-gradient(100deg,var(--sea-deep),var(--sea));color:#fff;
    font-family:inherit;font-size:17px;font-weight:700;letter-spacing:.04em;
    box-shadow:0 6px 20px rgba(31,155,224,.35);display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-go:active{transform:scale(.99);}
  .btn-go:disabled{opacity:.4;box-shadow:none;cursor:not-allowed;}

  /* 結果 */
  #result{display:none;}
  #result.show{display:block;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .verdict{
    border-radius:var(--radius);padding:20px 18px;margin-bottom:16px;
    border:1px solid var(--line);position:relative;overflow:hidden;
  }
  .verdict .place{font-size:13px;color:var(--muted);margin-bottom:4px;}
  .verdict .head{font-size:21px;font-weight:800;line-height:1.3;margin-bottom:8px;}
  .verdict .desc{font-size:14px;}
  .verdict.lv-crit{background:linear-gradient(160deg,rgba(255,45,45,.16),var(--panel));border-color:rgba(255,45,45,.4);}
  .verdict.lv-crit .head{color:#ff6b6d;}
  .verdict.lv-high{background:linear-gradient(160deg,rgba(255,77,79,.12),var(--panel));border-color:rgba(255,77,79,.32);}
  .verdict.lv-high .head{color:#ff7a45;}
  .verdict.lv-mid{background:linear-gradient(160deg,rgba(255,176,46,.12),var(--panel));border-color:rgba(255,176,46,.32);}
  .verdict.lv-mid .head{color:var(--warn);}
  .verdict.lv-low{background:linear-gradient(160deg,rgba(31,199,125,.1),var(--panel));border-color:rgba(31,199,125,.3);}
  .verdict.lv-low .head{color:var(--safe);}

  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .metric{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px 14px;text-align:center;
  }
  .metric .mlabel{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .metric .mval{font-family:var(--num);font-size:46px;line-height:.95;letter-spacing:.02em;}
  .metric .munit{font-size:15px;font-family:var(--font);color:var(--muted);margin-left:3px;}
  .metric.time .mval{color:var(--warn);}
  .metric.height .mval{color:var(--sea);}
  .metric .mnote{font-size:11px;color:var(--muted);margin-top:5px;}

  .escape{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:16px;
  }
  .escape .et{font-size:13px;color:var(--muted);margin-bottom:8px;}
  .escape .ev{font-size:16px;font-weight:700;line-height:1.5;}
  .escape .ev b{font-family:var(--num);font-size:26px;color:var(--sea);letter-spacing:.02em;vertical-align:-2px;}
  .escape.warn .ev{color:#ff7a45;}

  .actions{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
  .act{
    display:flex;align-items:center;gap:12px;text-decoration:none;
    background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:14px 16px;color:var(--ink);transition:border-color .15s;
  }
  .act:hover{border-color:var(--sea);}
  .act .ic{flex:0 0 24px;font-size:22px;text-align:center;}
  .act .tx{flex:1;}
  .act .tx .t{font-weight:700;font-size:15px;}
  .act .tx .s{font-size:12px;color:var(--muted);}
  .act .ar{color:var(--muted);font-size:18px;}
  .act.primary{background:linear-gradient(100deg,var(--sea-deep),var(--sea));border:none;color:#fff;}
  .act.primary .tx .s{color:rgba(255,255,255,.85);}
  .act.primary .ar{color:#fff;}

  .steps-mini{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px;
  }
  .steps-mini .st{font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:700;}
  .steps-mini ol{margin:0;padding-left:20px;}
  .steps-mini li{margin-bottom:7px;font-size:14px;}
  .steps-mini li:last-child{margin-bottom:0;}
  .steps-mini li b{color:var(--ink);}

  .disclaimer{
    font-size:11.5px;color:var(--muted);line-height:1.7;
    background:rgba(255,176,46,.07);border:1px solid rgba(255,176,46,.25);
    border-radius:12px;padding:13px 14px;margin-bottom:14px;
  }
  .disclaimer b{color:var(--warn);}
  .src{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;}
  .src a{color:var(--sea);}

  .reset{
    display:block;width:100%;margin-top:6px;background:none;
    border:1px solid var(--line);color:var(--muted);font:inherit;font-size:14px;
    padding:13px;border-radius:12px;cursor:pointer;
  }
  .reset:hover{border-color:var(--sea);color:var(--ink);}

  /* 共有・コピー */
  .share-card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:16px;
  }
  .share-card .sh-title{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:12px;}
  .share-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .share-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    text-decoration:none;border:1px solid var(--line);border-radius:11px;
    padding:13px 10px;color:var(--ink);font-size:14px;font-weight:700;
    background:var(--panel2);cursor:pointer;font-family:inherit;transition:transform .1s,border-color .15s;
  }
  .share-btn:active{transform:scale(.97);}
  .share-btn .si{font-size:18px;}
  .share-btn.line{background:#06c755;border-color:#06c755;color:#fff;}
  .share-btn.sms{background:#34c759;border-color:#34c759;color:#fff;}
  .share-btn.mail{background:#3478f6;border-color:#3478f6;color:#fff;}
  .share-btn.copy{background:var(--panel2);}
  .share-btn.copy.done{border-color:var(--safe);color:var(--safe);}
  .share-btn.family{grid-column:1/-1;background:linear-gradient(100deg,var(--sea-deep),var(--sea));border:none;color:#fff;font-size:15px;padding:15px;}
  .share-btn.native{grid-column:1/-1;}

  .dwa-link{
    display:flex;align-items:center;gap:12px;text-decoration:none;
    background:linear-gradient(160deg,rgba(255,45,45,.12),var(--panel));
    border:1px solid rgba(255,45,45,.3);border-radius:14px;
    padding:15px 16px;margin-bottom:16px;color:var(--ink);
  }
  .dwa-link .dl-ic{flex:0 0 38px;width:38px;height:38px;border-radius:10px;background:var(--crit);display:grid;place-items:center;font-size:20px;}
  .dwa-link .dl-tx{flex:1;}
  .dwa-link .dl-tx .t{font-weight:700;font-size:15px;}
  .dwa-link .dl-tx .s{font-size:12px;color:var(--muted);}
  .dwa-link .dl-ar{color:var(--muted);font-size:18px;}

  .reset-row{display:flex;gap:10px;}
  .reset-row .reset{margin-top:0;flex:1;}
  .reset-row .reset.again{border-color:var(--sea);color:var(--sea);font-weight:700;}

  .pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;margin-left:6px;vertical-align:1px;}
  .pill.crit{background:rgba(255,45,45,.2);color:#ff8a8b;}
  .pill.low{background:rgba(31,199,125,.18);color:var(--safe);}

  @media(max-width:380px){
    .hero h1{font-size:20px;}
    .metric .mval{font-size:38px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="wave">🌊</div>
    <h1>南海トラフ <b>津波避難診断</b></h1>
    <p>あなたの地点に、津波は何分で・何メートル来るのか。<br>逃げ切れるのかを確認しましょう。</p>
  </div>

  <!-- 入力 -->
  <div class="card" id="inputCard">
    <h2><span class="step">1</span>お住まい・確認したい場所</h2>
    <label class="fld">
      <span class="lbl">都道府県</span>
      <span class="select-wrap"><select id="pref"><option value="">選択してください</option></select></span>
    </label>
    <label class="fld">
      <span class="lbl">市区町村</span>
      <span class="select-wrap"><select id="city" disabled><option value="">先に都道府県を選択</option></select></span>
    </label>
    <label class="fld">
      <span class="lbl">詳しい住所（任意・避難場所の検索に使います）</span>
      <input type="text" id="addr" placeholder="例：○○町1-2-3、△△小学校の近く など" autocomplete="off">
    </label>
    <button class="btn-go" id="goBtn" disabled>🌊 津波リスクを診断する</button>
  </div>

  <!-- 結果 -->
  <div id="result"></div>

</div>

/* ---------- 危険度判定 ---------- */
function levelOf(t,h){
  // 到達時間が短い or 津波が高いほど危険
  if(t<=5 || h>=20) return {key:'crit', label:'極めて高い危険', pill:'最優先で対策を'};
  if(t<=10 || h>=10) return {key:'high', label:'高い危険', pill:''};
  if(t<=30 || h>=5) return {key:'mid', label:'中程度の危険', pill:''};
  return {key:'low', label:'比較的低い危険', pill:''};
}

/* ---------- 避難可能距離（消防庁指針ベース） ----------
   歩行速度 約60m/分、避難開始まで2〜5分を差し引いた目安 */
function escapeDistance(t){
  const prep = 3;            // 避難開始までの準備(分)
  const speed = 60;          // m/分（夜間や高齢者はさらに低下）
  const usable = Math.max(0, t - prep);
  return {usable, dist: Math.round(usable*speed), prep, speed};
}

    return `避難の猶予はわずかです。地震を感じたら情報を待たず、ただちに高い場所へ向かってください。`;

  const text = _shareText || '南海トラフ 津波避難診断';
  const subject = '【津波避難診断】結果の共有';
  if(kind==='native' || kind==='any'){
    if(navigator.share){
      navigator.share({title:'南海トラフ 津波避難診断', text:_shareText, url:PAGE_URL}).catch(()=>{});
      return;
    }
    // ネイティブ共有が無い端末では、まずコピーして案内
    if(kind==='any'){ copyResult(true); return; }
  }
  if(kind==='line'){
    // LINE共有（テキスト＋URL）
    window.open('https://line.me/R/share?text=' + encodeURIComponent(text), '_blank');
    return;
  }
  if(kind==='sms'){
    // SMS本文に結果を差し込む（端末でメッセージアプリが開く）
    window.location.href = 'sms:?&body=' + encodeURIComponent(text);
    return;
  }
  if(kind==='mail'){
    window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(text);
    return;
  }
}

function copyResult(silentFallback){
  const text = _shareText || '';
  const btn = document.getElementById('copyBtn');
  const done = ()=>{
    if(btn){ btn.classList.add('done'); btn.innerHTML='<span class="si">✅</span>コピーしました'; 
      setTimeout(()=>{ btn.classList.remove('done'); btn.innerHTML='<span class="si">📋</span>結果をコピー'; },2200); }
    if(silentFallback) alert('結果をコピーしました。LINEやメッセージに貼り付けて家族に送ってください。');
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else {
    fallbackCopy(text,done);
  }
}
function fallbackCopy(text,cb){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); cb&&cb(); }catch(e){ alert('コピーできませんでした。手動で選択してください。'); }
  document.body.removeChild(ta);
}
